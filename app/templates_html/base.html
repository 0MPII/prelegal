<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}prelegal{% endblock %}</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --bg-elevated: #ffffff;
      --nav-bg: rgba(255, 255, 255, 0.72);
      --fg: #1d1d1f;
      --muted: #6e6e73;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.14);
      --accent: #0066cc;
      --accent-fg: #ffffff;
      --primary-bg: #1d1d1f;
      --primary-fg: #ffffff;
      --field-bg: #f5f5f7;
      --highlight-bg: rgba(0, 102, 204, 0.1);
      --danger: #c7361f;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 1px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --bg-elevated: #1c1c1e;
        --nav-bg: rgba(0, 0, 0, 0.72);
        --fg: #f5f5f7;
        --muted: #98989d;
        --border: rgba(255, 255, 255, 0.1);
        --border-strong: rgba(255, 255, 255, 0.18);
        --accent: #2997ff;
        --accent-fg: #ffffff;
        --primary-bg: #f5f5f7;
        --primary-fg: #1d1d1f;
        --field-bg: #1c1c1e;
        --highlight-bg: rgba(41, 151, 255, 0.16);
        --danger: #ff6b52;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.45);
      }
    }
    :root[data-theme="light"] {
      --bg: #ffffff; --bg-elevated: #ffffff; --nav-bg: rgba(255,255,255,0.72);
      --fg: #1d1d1f; --muted: #6e6e73; --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
      --accent: #0066cc; --accent-fg: #ffffff; --primary-bg: #1d1d1f; --primary-fg: #ffffff;
      --field-bg: #f5f5f7; --highlight-bg: rgba(0,102,204,0.1); --danger: #c7361f;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 1px rgba(0,0,0,0.03);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    }
    :root[data-theme="dark"] {
      --bg: #000000; --bg-elevated: #1c1c1e; --nav-bg: rgba(0,0,0,0.72);
      --fg: #f5f5f7; --muted: #98989d; --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.18);
      --accent: #2997ff; --accent-fg: #ffffff; --primary-bg: #f5f5f7; --primary-fg: #1d1d1f;
      --field-bg: #1c1c1e; --highlight-bg: rgba(41,151,255,0.16); --danger: #ff6b52;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3); --shadow-md: 0 8px 24px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.55;
      letter-spacing: -0.01em;
    }
    a { color: var(--accent); }

    /* --- Nav --- */
    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      padding: 0 1.5rem;
      background: var(--nav-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--fg);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
    }
    .nav-mark {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: var(--fg);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.15s var(--ease);
    }
    .nav-links a:hover { color: var(--fg); }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }
    main.narrow { max-width: 720px; }

    h1, h2, h3 { font-weight: 650; letter-spacing: -0.02em; }

    /* --- Buttons --- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 980px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s var(--ease), opacity 0.15s var(--ease), box-shadow 0.15s var(--ease);
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--primary-bg);
      color: var(--primary-fg);
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      background: transparent;
      color: var(--accent);
      padding-left: 0;
      padding-right: 0;
    }
    .btn-secondary:hover { opacity: 0.7; }

    /* --- Back link --- */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 1.75rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .back-link:hover { opacity: 0.7; }

    /* --- Catalog --- */
    .eyebrow {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0 0 0.5rem;
    }
    .hero h1 { font-size: clamp(2rem, 5vw, 2.75rem); margin: 0 0 0.6rem; }
    .hero p { color: var(--muted); font-size: 1.1rem; max-width: 46ch; margin: 0 0 2.5rem; }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .catalog-item {
      position: relative;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s var(--ease), transform 0.2s var(--ease), border-color 0.2s var(--ease);
    }
    .catalog-item:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--border-strong);
    }
    .catalog-item-link {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 1.5rem 1.5rem 1.25rem;
    }
    .doc-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--highlight-bg);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.9rem;
    }
    .catalog-item h2 {
      margin: 0 0 0.4rem;
      font-size: 1.02rem;
      color: var(--fg);
    }
    .catalog-item p {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .create-link {
      display: block;
      padding: 0 1.5rem 1.25rem;
    }
    .create-link a {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .create-link a:hover { opacity: 0.7; }

    /* --- Document reading view --- */
    .doc-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .doc-header h1 { font-size: 1.6rem; margin: 0.25rem 0 0; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.65rem;
      border-radius: 980px;
      background: var(--field-bg);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 500;
    }
    .doc { font-size: 1rem; }
    .doc h1, .doc h2, .doc h3 { line-height: 1.3; }
    .doc ol { padding-left: 1.3rem; }
    .doc li { margin-bottom: 1rem; }
    .doc table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }
    .doc th, .doc td {
      border: 1px solid var(--border);
      padding: 0.6rem 0.75rem;
      text-align: left;
      font-size: 0.9rem;
    }
    .doc pre {
      background: var(--field-bg);
      padding: 0.9rem;
      border-radius: var(--radius-sm);
      overflow-x: auto;
    }

    footer {
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/">
      <span class="nav-mark">P</span>
      prelegal
    </a>
    <div class="nav-links">
      <a href="/">Templates</a>
    </div>
  </nav>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <footer>prelegal — standard agreements, filled in and ready to go.</footer>
</body>
</html>
